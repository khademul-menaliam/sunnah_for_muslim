name: 🚀 Deploy to live server via FTP

on:
  push:
    branches:
      - main
      - master

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: ⚙️ Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, xml, ctype, iconv, mysql, gd

    - name: 📦 Install Composer dependencies
      run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: 📦 Install NPM dependencies & Build Assets
      run: |
        npm ci
        npm run build

    - name: 📂 Sync files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ftp.thesyndicates.team
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        local-dir: ./
        server-dir: /
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/tests/**
          **/phpunit.xml
          **/.env.example
          **/.editorconfig
          **/package-lock.json
          **/package.json
          **/vite.config.js
          **/tailwind.config.js
          **/postcss.config.js
          **/.mcp.json
          **/.cursor/**
          **/.claude/**
          **/AGENTS.md
          **/CLAUDE.md
          **/README.md
          **/composer.json
          **/composer.lock
          **/storage/logs/**
          **/storage/framework/cache/**
          **/storage/framework/sessions/**
          **/storage/framework/views/**
